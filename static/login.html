<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NutriCore Auth</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body{
background:#0f172a;
color:white;
font-family:Arial, Helvetica, sans-serif;
}

.hero-bg{
background:
linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.75)),
url("https://images.unsplash.com/photo-1517836357463-d25dfeac3438");
background-size:cover;
background-position:center;
}

.card{
background:#1e293b;
backdrop-filter: blur(10px);
}

input{
background:#020617 !important;
color:white;
border:1px solid #334155 !important;
}

input::placeholder{
color:#64748b;
}

input:focus{
border-color:#22c55e !important;
outline:none;
}

.primary-btn{
background:#22c55e;
}

.primary-btn:hover{
transform:scale(1.03);
}

.gradient-btn{
background:linear-gradient(135deg,#22c55e,#4ade80);
}

.toggle-pass{
position:absolute;
right:14px;
top:50%;
transform:translateY(-50%);
color:#94a3b8;
cursor:pointer;
}
</style>

</head>

<body class="hero-bg min-h-screen">

<nav class="flex justify-between items-center px-10 py-5 bg-black/40 backdrop-blur border-b border-slate-800">

<h1 class="text-2xl font-black text-green-400 tracking-wide">
NUTRICORE
</h1>

<div id="nav-links" class="hidden flex items-center gap-6 text-sm font-bold">
<button onclick="location.reload()" class="bg-slate-800 px-5 py-2 rounded-full hover:bg-slate-700">Logout</button>
</div>

</nav>

<div class="container mx-auto px-6">

<div id="view-auth" class="max-w-md mx-auto mt-20 card p-10 rounded-3xl shadow-2xl">

<!-- LOGIN -->

<div id="login-form">

<h2 class="text-3xl font-black mb-8 text-green-400 flex items-center gap-3">
<i class="fas fa-user-circle"></i> Sign In
</h2>

<div id="login-message" class="mb-4 hidden px-4 py-2 rounded-xl text-center font-bold"></div>

<div class="space-y-4 mb-6">

<div class="relative">
<i class="fas fa-envelope absolute left-4 top-4 text-slate-500"></i>
<input id="email" type="email" placeholder="Email"
class="w-full pl-12 p-4 rounded-xl">
</div>

<div class="relative">
<i class="fas fa-lock absolute left-4 top-4 text-slate-500"></i>
<input id="password" type="password" placeholder="Password"
class="w-full pl-12 pr-12 p-4 rounded-xl">
<button type="button" class="toggle-pass" onclick="togglePassword('password', this)" aria-label="Show password">
<i class="fas fa-eye"></i>
</button>
</div>

</div>

<button onclick="login()"
class="w-full gradient-btn py-4 rounded-xl font-black shadow-lg transition">
LOGIN
</button>

<div class="flex justify-between mt-6 text-xs font-bold">

<button onclick="switchForm('forgot')" class="text-slate-400 hover:text-green-400">
Forgot Password
</button>

<button onclick="switchForm('register')" class="text-green-400 hover:underline">
Create Account
</button>

</div>

</div>

<!-- FORGOT PASSWORD -->

<div id="forgot-form" class="hidden">

<h2 class="text-2xl font-black mb-6 text-green-400">Password Recovery</h2>

<div id="forgot-message" class="mb-4 hidden px-4 py-2 rounded-xl text-center font-bold"></div>

<input id="f-email" type="email"
placeholder="Registered Email"
class="w-full p-4 mb-4 rounded-xl">

<button onclick="handleForgot()"
class="w-full primary-btn py-4 rounded-xl font-black">
GET OTP
</button>

<div id="reset-area" class="hidden pt-6 border-t border-slate-700 mt-6 space-y-3">

<input id="f-token" type="text"
placeholder="Enter OTP"
class="w-full p-4 rounded-xl">

<div class="relative">
<input id="f-pass" type="password"
placeholder="New Password"
class="w-full pr-12 p-4 rounded-xl">
<button type="button" class="toggle-pass" onclick="togglePassword('f-pass', this)" aria-label="Show password">
<i class="fas fa-eye"></i>
</button>
</div>

<button onclick="submitReset()"
class="w-full bg-green-500 py-4 rounded-xl font-black">
UPDATE PASSWORD
</button>

</div>

<button onclick="switchForm('login')" class="w-full mt-4 text-xs text-center text-slate-400 hover:text-green-400">
Back
</button>

</div>

<!-- REGISTER -->

<div id="register-form" class="hidden">

<h2 class="text-3xl font-black mb-6 text-green-400 flex gap-2 items-center">
<i class="fas fa-user-plus"></i> Register
</h2>

<div id="register-message" class="mb-4 hidden px-4 py-2 rounded-xl text-center font-bold"></div>

<div class="space-y-4 mb-6">

<input id="r-name" type="text" placeholder="Name"
class="w-full p-4 rounded-xl">

<input id="r-email" type="email" placeholder="Email"
class="w-full p-4 rounded-xl">

<input id="r-mobile" type="tel" maxlength="10"
placeholder="Mobile (10 digits)"
class="w-full p-4 rounded-xl">

<div class="relative">
<input id="r-pass" type="password"
placeholder="Password"
class="w-full pr-12 p-4 rounded-xl">
<button type="button" class="toggle-pass" onclick="togglePassword('r-pass', this)" aria-label="Show password">
<i class="fas fa-eye"></i>
</button>
</div>

</div>

<button onclick="register()"
class="w-full gradient-btn py-4 rounded-xl font-black shadow-lg">
Join NutriCore
</button>

<button onclick="switchForm('login')"
class="w-full mt-4 text-xs text-slate-400 hover:text-green-400">
Back
</button>

</div>

</div>

<!-- DASHBOARD -->

<div id="view-dashboard"
class="hidden max-w-3xl mx-auto mt-20 card p-10 rounded-3xl text-center">

<h2 class="text-3xl font-black text-green-400">
Welcome to NutriCore Dashboard
</h2>

</div>

<!-- ADMIN -->

<div id="view-admin"
class="hidden max-w-3xl mx-auto mt-20 card p-10 rounded-3xl text-center">

<h2 class="text-3xl font-black text-green-400">
NutriCore Admin Panel
</h2>

</div>

</div>

<script>
let user = null;
const USER_KEY = 'nutricore_user';
const TOKEN_KEY = 'nutricore_token';

function redirectIfAuthenticated(){
const token=localStorage.getItem(TOKEN_KEY)||'';
let savedUser=null;
try{
savedUser=JSON.parse(localStorage.getItem(USER_KEY)||'null');
}catch(e){
savedUser=null;
}
if(token&&savedUser&&savedUser.id){
window.location.replace(savedUser.is_admin ? '/adminpanel.html' : '/store');
return true;
}
return false;
}

function showView(v) {
['view-auth','view-dashboard','view-admin'].forEach(id=>document.getElementById(id).classList.add('hidden'));
document.getElementById('view-'+v).classList.remove('hidden');
}

function switchForm(v){
['login-form','register-form','forgot-form'].forEach(id=>document.getElementById(id).classList.add('hidden'));
document.getElementById(v+'-form').classList.remove('hidden');
}

function showMessage(id,msg,type='error'){
const el=document.getElementById(id);
el.innerText=msg;
el.classList.remove('hidden');
}

function hideMessage(id){
document.getElementById(id).classList.add('hidden');
}

function togglePassword(inputId,btn){
const input=document.getElementById(inputId);
const icon=btn.querySelector('i');
const isHidden=input.type==='password';
input.type=isHidden?'text':'password';
icon.classList.toggle('fa-eye',!isHidden);
icon.classList.toggle('fa-eye-slash',isHidden);
btn.setAttribute('aria-label',isHidden?'Hide password':'Show password');
}

async function login(){
const res=await fetch('/login',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
email:document.getElementById('email').value,
password:document.getElementById('password').value
})
});

const data=await res.json();

if(res.ok){
user=data.user;
localStorage.setItem(TOKEN_KEY, data.token || '');

let persistedUser=data.user||{};
try{
const profileRes=await fetch('/user/profile',{
headers:{Authorization:`Bearer ${data.token||''}`}
});
const profileData=await profileRes.json();
if(profileRes.ok){
persistedUser={...persistedUser,...profileData};
}
}catch(error){
}

localStorage.setItem(USER_KEY, JSON.stringify(persistedUser));
window.location.replace(user.is_admin ? `/adminpanel.html?v=${Date.now()}` : `/store?v=${Date.now()}`);
}else{
showMessage('login-message',data.message);
}
}

async function handleForgot(){
const res=await fetch('/forgot-password',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
email:document.getElementById('f-email').value
})
});

const data=await res.json();

if(res.ok){
showMessage('forgot-message','OTP sent');
document.getElementById('reset-area').classList.remove('hidden');
}else{
showMessage('forgot-message',data.message);
}
}

async function submitReset(){
const email=document.getElementById('f-email').value;
const otp=document.getElementById('f-token').value;
const new_password=document.getElementById('f-pass').value;

const res=await fetch('/reset-password',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({email,otp,new_password})
});

const data=await res.json();

if(res.ok){
switchForm('login');
showMessage('login-message','Password updated','success');
}else{
showMessage('forgot-message',data.message);
}
}

async function register(){
const name=document.getElementById('r-name').value.trim();
const email=document.getElementById('r-email').value.trim().toLowerCase();
const mobile=document.getElementById('r-mobile').value.trim();
const password=document.getElementById('r-pass').value;

if(!email.endsWith('@gmail.com')){
showMessage('register-message','Invalid email');
return;
}

if(!/^[0-9]{10}$/.test(mobile)){
showMessage('register-message','Invalid mobile');
return;
}

const res=await fetch('/register',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({name,email,mobile,password})
});

if(res.ok){
switchForm('login');
showMessage('login-message','Registered successfully','success');
}else{
const data=await res.json();
showMessage('register-message',data.message);
}
}

if(!redirectIfAuthenticated()){
window.addEventListener('pageshow',()=>{redirectIfAuthenticated()});
}
</script>

</body>
</html>
