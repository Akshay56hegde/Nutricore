<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriCore Cart</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{
background:#0f172a;
color:#fff;
font-family:Arial, Helvetica, sans-serif;
}
.card{
background:#1e293b;
}
.btn{
background:#22c55e;
}
.btn:hover{
background:#16a34a;
}
</style>
</head>
<body>
<nav class="bg-black/50 backdrop-blur border-b border-slate-800 px-6 md:px-10 py-4 flex items-center justify-between">
<h1 class="text-2xl font-black text-green-400">NUTRICORE</h1>
<div class="flex items-center gap-3">
<a href="/homepage.html" class="bg-slate-800 px-4 py-2 rounded-lg hover:bg-slate-700">Continue Shopping</a>
<button id="clearCartBtn" class="bg-red-600 px-4 py-2 rounded-lg hover:bg-red-500">Clear Cart</button>
</div>
</nav>

<main class="max-w-6xl mx-auto p-6 md:p-10">
<h2 class="text-3xl font-bold mb-6">Your Cart</h2>
<p id="statusText" class="text-slate-300 mb-4">Loading cart...</p>

<div class="grid grid-cols-1 lg:grid-cols-[1fr_340px] gap-6">
<section id="cartList" class="space-y-4"></section>

<aside class="card rounded-xl p-5 h-fit border border-slate-700">
<h3 class="text-xl font-bold mb-4">Order Summary</h3>
<div class="space-y-2 text-slate-200">
<p>Total Items: <span id="sumItems" class="font-bold">0</span></p>
<p>Total Protein: <span id="sumProtein" class="font-bold">0g</span></p>
<p>Subtotal: <span id="sumPrice" class="font-bold">₹0.00</span></p>
</div>
<button id="checkoutBtn" class="btn w-full mt-5 py-3 rounded-lg font-bold">Proceed to Checkout</button>
</aside>
</div>
</main>

<script>
const CART_KEY = 'nutricore_cart';

function getCart(){
try{
return JSON.parse(localStorage.getItem(CART_KEY) || '[]');
}catch(e){
return [];
}
}

function saveCart(cart){
localStorage.setItem(CART_KEY, JSON.stringify(cart));
renderCart();
}

function setQty(id, nextQty){
const cart = getCart();
const idx = cart.findIndex((item) => item.id === id);
if(idx < 0) return;
if(nextQty <= 0){
cart.splice(idx, 1);
}else{
cart[idx].qty = nextQty;
}
saveCart(cart);
}

function removeItem(id){
const cart = getCart().filter((item) => item.id !== id);
saveCart(cart);
}

function renderCart(){
const cart = getCart();
const cartList = document.getElementById('cartList');
const statusText = document.getElementById('statusText');
const checkoutBtn = document.getElementById('checkoutBtn');

cartList.innerHTML = '';
if(!cart.length){
statusText.textContent = 'Your cart is empty.';
checkoutBtn.disabled = true;
checkoutBtn.classList.add('opacity-50', 'cursor-not-allowed');
}else{
statusText.textContent = `${cart.length} product(s) in cart`;
checkoutBtn.disabled = false;
checkoutBtn.classList.remove('opacity-50', 'cursor-not-allowed');
}

let totalItems = 0;
let totalProtein = 0;
let totalPrice = 0;

cart.forEach((item) => {
totalItems += item.qty;
totalProtein += (Number(item.protein || 0) * item.qty);
totalPrice += (Number(item.price || 0) * item.qty);

const row = document.createElement('article');
row.className = 'card rounded-xl p-4 border border-slate-700 flex flex-col md:flex-row md:items-center md:justify-between gap-4';
row.innerHTML = `
<div>
<h4 class="text-lg font-bold">${item.name}</h4>
<p class="text-slate-300">${Number(item.protein || 0)}g protein each</p>
<p class="text-green-400 font-bold">₹${Number(item.price || 0).toFixed(2)} each</p>
</div>
<div class="flex items-center gap-3">
<button class="bg-slate-700 px-3 py-1 rounded qty-minus">-</button>
<span class="font-bold min-w-[24px] text-center">${item.qty}</span>
<button class="bg-slate-700 px-3 py-1 rounded qty-plus">+</button>
<button class="bg-red-600 px-3 py-1 rounded remove-btn">Remove</button>
</div>
`;

row.querySelector('.qty-minus').addEventListener('click', () => setQty(item.id, item.qty - 1));
row.querySelector('.qty-plus').addEventListener('click', () => setQty(item.id, item.qty + 1));
row.querySelector('.remove-btn').addEventListener('click', () => removeItem(item.id));
cartList.appendChild(row);
});

document.getElementById('sumItems').textContent = String(totalItems);
document.getElementById('sumProtein').textContent = `${totalProtein.toFixed(1)}g`;
document.getElementById('sumPrice').textContent = `₹${totalPrice.toFixed(2)}`;
}

document.getElementById('clearCartBtn').addEventListener('click', () => {
localStorage.removeItem(CART_KEY);
renderCart();
});

document.getElementById('checkoutBtn').addEventListener('click', () => {
if(!getCart().length){
alert('Your cart is empty.');
return;
}
alert('Checkout step (address/payment) will be added next.');
});

renderCart();
</script>
</body>
</html>
